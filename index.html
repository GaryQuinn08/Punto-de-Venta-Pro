<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Refaccionaria San Lorenzo — Punto de Venta</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ══════════════════════════════════════════════════════════
     HEADER
══════════════════════════════════════════════════════════ -->
<header>
  <div class="logo">🏍️ <span>REFACCIONARIA</span> SAN LORENZO</div>
  <nav class="nav-tabs">
    <button id="tab-pos"  class="nav-tab active" onclick="showPage('pos')">🛒 Venta</button>
    <button id="tab-hist" class="nav-tab"         onclick="showPage('hist')">📋 Historial</button>
    <button id="tab-inv"  class="nav-tab"         onclick="showPage('inv')">📦 Inventario</button>
  </nav>
  <div class="header-clock" id="clock"></div>
</header>

<!-- ══════════════════════════════════════════════════════════
     APP SHELL  (fills exactly the viewport below the header)
══════════════════════════════════════════════════════════ -->
<div class="app-shell">

  <!-- ── PAGE: POS / VENTA ─────────────────────────────────── -->
  <div class="page active" id="page-pos">
    <div class="pos-layout">

      <!-- Left: catalog -->
      <div class="panel-left">

        <div class="search-bar">
          <div class="search-wrap">
            <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
              <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
            </svg>
            <input type="text" id="searchInput" placeholder="Buscar producto…" oninput="filterProducts()">
          </div>
        </div>

        <!-- Horizontally scrollable category pills -->
        <div class="cats" id="cats"></div>

        <!-- Independently scrollable product grid -->
        <div class="products" id="productGrid">
          <div class="no-results">Cargando productos…</div>
        </div>

      </div><!-- /panel-left -->

      <!-- Right: cart — fully static (header + checkout never move) -->
      <div class="panel-right">

        <div class="cart-header">
          <div class="cart-title">
            🧾 Venta
            <span class="cart-badge" id="cartCount">0</span>
          </div>
          <button class="btn-sm" onclick="clearCart()">✕ Limpiar</button>
        </div>

        <!-- Only this zone scrolls inside the cart panel -->
        <div class="cart-items" id="cartItems">
          <div class="cart-empty">
            <span class="cart-empty-icon">🛒</span>
            <span>Selecciona productos del catálogo</span>
          </div>
        </div>

        <!-- Checkout always anchored at the bottom -->
        <div class="checkout">
          <div class="summary-row">
            <span>Artículos</span>
            <span id="itemsCount">0 pza</span>
          </div>
          <div class="summary-total">
            <span>TOTAL</span>
            <span id="totalAmount">$0.00</span>
          </div>
          <div class="payment-row">
            <span class="pay-label">💵 Pago</span>
            <input type="number" class="pay-input" id="payInput"
                   placeholder="0.00" min="0" step="0.50" oninput="calcChange()">
          </div>
          <div class="change-box">
            <span class="change-label">💰 Cambio</span>
            <span class="change-amount" id="changeAmount">—</span>
          </div>
          <button class="btn-cobrar" id="btnCobrar" onclick="cobrar()" disabled>
            COBRAR
          </button>
        </div>

      </div><!-- /panel-right -->
    </div><!-- /pos-layout -->
  </div><!-- /page-pos -->

  <!-- ── PAGE: HISTORIAL ───────────────────────────────────── -->
  <div class="page scroll-page" id="page-hist">
    <div class="page-header">
      <div class="page-title">📋 Historial de Ventas</div>
      <button class="btn-danger" onclick="clearHistory()">🗑 Borrar todo</button>
    </div>
    <div class="stat-cards" id="statCards"></div>
    <div id="histList"></div>
  </div>

  <!-- ── PAGE: INVENTARIO ──────────────────────────────────── -->
  <div class="page scroll-page" id="page-inv">
    <div class="page-header">
      <div class="page-title">📦 Inventario</div>
      <div class="inv-actions">
        <button class="btn-inv-action btn-export" onclick="exportExcel()">
          ⬇️ Exportar Excel
        </button>
        <button class="btn-inv-action btn-import" onclick="importExcel()">
          ⬆️ Importar Excel
        </button>
      </div>
    </div>
    <!-- Hidden file input for import -->
    <input type="file" id="xlsxImportInput" accept=".xlsx,.xls"
           style="display:none" onchange="handleImportFile(event)">
    <div class="inv-toolbar">
      <input type="text" id="invSearch" placeholder="Buscar producto o categoría…" oninput="renderInventory()">
      <span class="inv-count" id="invCount"></span>
    </div>
    <div class="inv-actions" style="margin-bottom:10px;">
      <button class="btn-excel-export" onclick="exportExcel()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Exportar Excel
      </button>
      <button class="btn-excel-import" onclick="importExcel()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Importar Excel
      </button>
      <!-- Hidden file input for import -->
      <input type="file" id="xlsxImportInput" accept=".xlsx,.xls" style="display:none" onchange="handleImportFile(event)">
    </div>
    <div class="import-result" id="importResult"></div>
    <div class="table-wrap">
      <table class="inv-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Producto</th>
            <th>Categoría</th>
            <th>Precio</th>
            <th>Stock</th>
            <th>Acción</th>
          </tr>
        </thead>
        <tbody id="invBody"></tbody>
      </table>
    </div>
  </div>

</div><!-- /app-shell -->

<!-- ══════════════════════════════════════════════════════════
     TICKET MODAL
══════════════════════════════════════════════════════════ -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="ticketModal"></div>
</div>

<div class="toast" id="toast"></div>

<script src="app.js"></script>
</body>
</html>
